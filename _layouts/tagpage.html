---
layout: default
---
<div class="wrapper">
	<div class="page">

		<header class="post-header">
			<h1 class="post-title">Posts in "{{ page.title }}"</h1>
		</header>

		{% include page_divider.html %}

		<article class="post-content">
			<ul class="posts-list">
				{% for post in site.tags[page.tag] %}
				<li><strong><a class="post-link" href="{{ post.url }}">{{ post.title }}</a></strong><span class="post-date"> - {{ post.date | date_to_string }}</span><br>
					{{ post.description }}
				</li>
				{% endfor %}
			</ul>
		</article>

	</div>
</div>
<br>
